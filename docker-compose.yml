services:
  postgres:
    image: postgres:15
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Avoid exposing mapped ports to the host unless strictly needed
    # If a direct connection is needed, uncomment the block below.
    # ports:
    #   - "5432:5432"

  redis:
    image: redis:7
    container_name: lms-redis
    restart: unless-stopped
    # ports:
    #   - "6379:6379"

  api-gateway:
    build: ./backend
    image: lms-backend
    container_name: lms-api-gateway
    restart: unless-stopped
    command: ["node", "dist/api-gateway/main.js"]
    # Only exposing the api-gateway to the outside world based on prompt instructions
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  auth-service:
    image: lms-backend
    container_name: lms-auth-service
    restart: unless-stopped
    command: ["node", "dist/auth-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  user-service:
    image: lms-backend
    container_name: lms-user-service
    restart: unless-stopped
    command: ["node", "dist/user-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  course-service:
    image: lms-backend
    container_name: lms-course-service
    restart: unless-stopped
    command: ["node", "dist/course-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  content-service:
    image: lms-backend
    container_name: lms-content-service
    restart: unless-stopped
    command: ["node", "dist/content-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  video-service:
    image: lms-backend
    container_name: lms-video-service
    restart: unless-stopped
    command: ["node", "dist/video-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  enrollment-service:
    image: lms-backend
    container_name: lms-enrollment-service
    restart: unless-stopped
    command: ["node", "dist/enrollment-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  payment-service:
    image: lms-backend
    container_name: lms-payment-service
    restart: unless-stopped
    command: ["node", "dist/payment-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  progress-service:
    image: lms-backend
    container_name: lms-progress-service
    restart: unless-stopped
    command: ["node", "dist/progress-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  review-service:
    image: lms-backend
    container_name: lms-review-service
    restart: unless-stopped
    command: ["node", "dist/review-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  notification-service:
    image: lms-backend
    container_name: lms-notification-service
    restart: unless-stopped
    command: ["node", "dist/notification-service/main.js"]
    env_file:
      - ./backend/.env
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    image: lms-frontend
    container_name: lms-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
