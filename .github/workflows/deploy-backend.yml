name: Deploy Backend to Azure VM

on:
  push:
    branches:
      - dev
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Navigate to the backend directory on your VM
            # Adjust this path if your repository is placed differently on the VM
            cd ~/verticalott-LMS/backend
            
            # Pull the latest code from the dev branch
            git pull origin dev
            
            # Rebuild the unified image incorporating the latest code
            docker compose build

            # Stop running containers to apply the new image
            docker compose down
            
            # Start the detached architecture back up
            docker compose up -d
