name: Deploy Frontend to Azure VM

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Navigate to the frontend directory on your VM
            cd ~/verticalott-LMS/frontend
            
            # Pull the latest frontend code from the dev branch
            git pull origin dev
            
            # Build the new Nginx+Vite docker image
            docker compose build

            # Stop the existing local container
            docker compose down
            
            # Re-initialize the frontend application mapping cleanly
            docker compose up -d
