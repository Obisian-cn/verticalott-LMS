version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  api-gateway:
    build: ./api-gateway
    command: ["node", "dist/main.js"]
    ports:
      - "3000:3000"
    env_file:
      - ./api-gateway/.env
    depends_on:
      - auth-service
      - user-service
      - course-service
      - content-service
      - video-service
      - enrollment-service
      - payment-service
      - progress-service
      - review-service
      - notification-service

  auth-service:
    build: ./auth-service
    command: ["node", "dist/main.js"]
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    depends_on:
      - postgres
      - redis

  user-service:
    build: ./user-service
    command: ["node", "dist/main.js"]
    ports:
      - "3002:3002"
    env_file:
      - ./user-service/.env
    depends_on:
      - postgres

  course-service:
    build: ./course-service
    command: ["node", "dist/main.js"]
    ports:
      - "3003:3003"
    env_file:
      - ./course-service/.env
    depends_on:
      - postgres

  content-service:
    build: ./content-service
    command: ["node", "dist/main.js"]
    ports:
      - "3004:3004"
    env_file:
      - ./content-service/.env
    depends_on:
      - postgres

  video-service:
    build: ./video-service
    command: ["node", "dist/main.js"]
    ports:
      - "3005:3005"
    env_file:
      - ./video-service/.env
    depends_on:
      - postgres

  enrollment-service:
    build: ./enrollment-service
    command: ["node", "dist/main.js"]
    ports:
      - "3006:3006"
    env_file:
      - ./enrollment-service/.env
    depends_on:
      - postgres

  payment-service:
    build: ./payment-service
    command: ["node", "dist/main.js"]
    ports:
      - "3007:3007"
    env_file:
      - ./payment-service/.env
    depends_on:
      - postgres

  progress-service:
    build: ./progress-service
    command: ["node", "dist/main.js"]
    ports:
      - "3008:3008"
    env_file:
      - ./progress-service/.env
    depends_on:
      - postgres

  review-service:
    build: ./review-service
    command: ["node", "dist/main.js"]
    ports:
      - "3009:3009"
    env_file:
      - ./review-service/.env
    depends_on:
      - postgres

  notification-service:
    build: ./notification-service
    command: ["node", "dist/main.js"]
    ports:
      - "3010:3010"
    env_file:
      - ./notification-service/.env
    depends_on:
      - postgres

volumes:
  postgres_data:

