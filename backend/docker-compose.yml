services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_password
      POSTGRES_DB: lms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  api-gateway:
    build: .
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/api-gateway/main.js"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - auth-service
      - user-service
      - course-service
      - content-service
      - video-service
      - enrollment-service
      - payment-service
      - progress-service
      - review-service
      - notification-service
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  auth-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/auth-service/main.js"]
    ports:
      - "3001:3001"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  user-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/user-service/main.js"]
    ports:
      - "3002:3002"
    env_file:
      - .env
    depends_on:
      - postgres

  course-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/course-service/main.js"]
    ports:
      - "3003:3003"
    env_file:
      - .env
    depends_on:
      - postgres

  content-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/content-service/main.js"]
    ports:
      - "3004:3004"
    env_file:
      - .env
    depends_on:
      - postgres

  video-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/video-service/main.js"]
    ports:
      - "3005:3005"
    env_file:
      - .env
    depends_on:
      - postgres

  enrollment-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/enrollment-service/main.js"]
    ports:
      - "3006:3006"
    env_file:
      - .env
    depends_on:
      - postgres

  payment-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/payment-service/main.js"]
    ports:
      - "3007:3007"
    env_file:
      - .env
    depends_on:
      - postgres

  progress-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/progress-service/main.js"]
    ports:
      - "3008:3008"
    env_file:
      - .env
    depends_on:
      - postgres

  review-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/review-service/main.js"]
    ports:
      - "3009:3009"
    env_file:
      - .env
    depends_on:
      - postgres

  notification-service:
    image: lms-backend
    restart: unless-stopped
    command: ["node", "dist/notification-service/main.js"]
    ports:
      - "3010:3010"
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres_data:
